# ==============================================================================
# NGINX REWRITE CONFIGURATION FOR aaPanel ON UBUNTU 22.04
# ==============================================================================
#
# INSTRUCTIONS FOR aaPanel:
# 1. Open your aaPanel Dashboard.
# 2. Go to "Website" -> Click your site settings.
# 3. In the left panel, click "Site directory" and set the "Running directory" to "/public"
#    (Or manually point root to: /home/dev/Projects/personal/chatbot/public)
# 4. Click "URL rewrite" on the left menu, select "User-defined" and paste the code below:

location / {
    try_files $uri $uri/ /index.php$is_args$args;
}

# SECURITY: Deny all direct access to sensitive core folders and environment files
location ~ /\.(env|git|htaccess) {
    deny all;
    return 404;
}

location ~* ^/(config|src|routes|storage|database)/ {
    deny all;
    return 404;
}

