services:
  # ── Base de datos MySQL ──────────────────────────────────────
  db:
    image: mariadb:11.4
    container_name: iptv_chatbot_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-iptv_manager}
      MARIADB_USER: ${DB_USER:-iptv_user}
      MARIADB_PASSWORD: ${DB_PASS:-secure_db_password_here}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ── PHP-FPM ───────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: iptv_chatbot_php
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-iptv_manager}
      DB_USER: ${DB_USER:-iptv_user}
      DB_PASS: ${DB_PASS:-secure_db_password_here}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY:-chatbot_secret_auth_token_here}
      APP_ENV: production
      APP_DEBUG: "false"
      XUI_API_URL: ${XUI_API_URL:-http://tripic.space/miapixui/}
      XUI_API_KEY: ${XUI_API_KEY:-30B0DD094F41213AB3394E374BA6A557}
      XUI_RESELLER_API_URL: ${XUI_RESELLER_API_URL:-http://tripic.space:80/resselerapi/}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_PRICE_PER_CREDIT: ${PAYPAL_PRICE_PER_CREDIT:-10.00}
    volumes:
      - ./src:/var/www/html/src:ro
      - ./routes:/var/www/html/routes:ro
      - ./config:/var/www/html/config:ro
      - ./public:/var/www/html/public:ro
      - ./vendor:/var/www/html/vendor:ro
      - php_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: iptv_chatbot_nginx
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  php_storage: